name: CVEarity SBOM Discovery
'on':
  repository_dispatch:
    types:
    - cvearity_sbom_scan
    - cvearity_iac_bom_scan
    - cvearity_ai_bom_scan
  push:
    branches:
    - main
    - master
  workflow_dispatch:
    inputs:
      api_url:
        description: CVEarity API URL
        required: false
        type: string
      upload_token:
        description: Upload Token (scan_id:token)
        required: false
        type: string
      scan_id:
        description: Scan ID
        required: false
        type: string
jobs:
  discovery:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.client_payload.branch || github.ref }}
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: 'npm install -g @cyclonedx/cdxgen

        pip install requests

        '
    - name: Run CVEarity Agentless Scan
      env:
        CVEARITY_API_URL: ${{ github.event.client_payload.api_url || github.event.inputs.api_url
          || secrets.CVEARITY_API_URL }}
        CVEARITY_UPLOAD_TOKEN: ${{ github.event.client_payload.upload_token || github.event.inputs.upload_token
          || secrets.CVEARITY_UPLOAD_TOKEN }}
      run: "SCAN_ID=\"${{ github.event.client_payload.scan_id || github.event.inputs.scan_id\
        \ || '0' }}\"\nexport SCAN_ID\n\ncat << 'EOF' > cvearity_scan.py\nimport subprocess\n\
        import json\nimport os\nimport requests\nimport sys\n\ndef run_cdxgen(source_dir:\
        \ str, output_file: str):\n    cmd = [\"cdxgen\", \"-r\", \"-o\", output_file,\
        \ source_dir]\n    print(f\"Running cdxgen: {' '.join(cmd)}\")\n    result\
        \ = subprocess.run(cmd, capture_output=True, text=True)\n    if result.returncode\
        \ != 0:\n        print(f\"Error running cdxgen:\\n{result.stderr}\")\n   \
        \     sys.exit(1)\n    print(f\"SBOM generated successfully at {output_file}\"\
        )\n\ndef extract_inventory(sbom_file: str) -> list:\n    try:\n        with\
        \ open(sbom_file, \"r\") as f:\n            sbom = json.load(f)\n    except\
        \ Exception as e:\n        print(f\"Failed to read SBOM file: {e}\")\n   \
        \     sys.exit(1)\n    components = sbom.get(\"components\", [])\n    inventory\
        \ = []\n    for comp in components:\n        inventory.append({\n        \
        \    \"name\": comp.get(\"name\"),\n            \"version\": comp.get(\"version\"\
        ),\n            \"purl\": comp.get(\"purl\"),\n            \"supplier\": comp.get(\"\
        supplier\", {}).get(\"name\") if isinstance(comp.get(\"supplier\"), dict)\
        \ else comp.get(\"supplier\"),\n            \"type\": comp.get(\"type\"),\n\
        \            \"bom_ref\": comp.get(\"bom-ref\")\n        })\n    return inventory\n\
        \ndef upload_inventory(api_url: str, scan_id: int, upload_token: str, inventory:\
        \ list):\n    payload = {\n        \"scan_id\": scan_id,\n        \"components\"\
        : inventory\n    }\n    headers = {\"Authorization\": f\"Bearer {upload_token}\"\
        } if upload_token else {}\n    print(f\"Uploading {len(inventory)} components\
        \ to API...\")\n    try:\n        # Using direct upload endpoint as configured\
        \ by the backend\n        endpoint = api_url if api_url.endswith(\"/api/inventory/upload\"\
        ) else f\"{api_url}/api/inventory/upload\"\n        response = requests.post(endpoint,\
        \ json=payload, headers=headers)\n        response.raise_for_status()\n  \
        \      print(\"Upload successful!\")\n    except Exception as e:\n       \
        \ print(f\"Failed to upload inventory: {e}\")\n        if hasattr(e, 'response')\
        \ and e.response:\n            print(e.response.text)\n        sys.exit(1)\n\
        \ndef main():\n    api_url = os.environ.get(\"CVEARITY_API_URL\")\n    scan_id\
        \ = int(os.environ.get(\"SCAN_ID\", \"0\"))\n    upload_token = os.environ.get(\"\
        CVEARITY_UPLOAD_TOKEN\")\n    if not api_url:\n        print(\"Error: CVEARITY_API_URL\
        \ environment variable is not set.\")\n        sys.exit(1)\n    output_file\
        \ = \"/tmp/bom.json\"\n    # Use GitHub Actions workspace directory as source\n\
        \    source_dir = os.environ.get(\"GITHUB_WORKSPACE\", \".\")\n    run_cdxgen(source_dir,\
        \ output_file)\n    inventory = extract_inventory(output_file)\n    upload_inventory(api_url,\
        \ scan_id, upload_token, inventory)\n\nif __name__ == \"__main__\":\n    main()\n\
        EOF\npython cvearity_scan.py\n"
